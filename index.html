<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elera Ventas - Tienda Oficial</title>
</head>
<body style="background: #060913; margin: 0; padding: 15px; font-family: sans-serif; color: #fff;">

  <!-- VISTA DE LOGIN / ACCESO -->
  <div id="vista-auth" style="max-width: 400px; margin: 40px auto; background: #0b0f19; padding: 25px; border-radius: 16px; border: 1px solid #1e293b; box-sizing: border-box;">
    <div style="text-align: center; margin-bottom: 20px;">
      <h2 style="margin: 0; color: #f8fafc; font-size: 22px;">💎 ELERA VENTAS 💎</h2>
      <p id="auth-titulo" style="font-size: 13px; color: #94a3b8; margin-top: 5px;">Inicia sesión en tu cuenta</p>
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; font-size: 12px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Correo electrónico</label>
      <input type="email" id="auth-email" placeholder="tucorreo@gmail.com" style="width: 100%; padding: 12px; font-size: 14px; border-radius: 8px; border: 1px solid #1e293b; background: #111827; color: #fff; box-sizing: border-box; outline: none;">
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 12px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••" style="width: 100%; padding: 12px; font-size: 14px; border-radius: 8px; border: 1px solid #1e293b; background: #111827; color: #fff; box-sizing: border-box; outline: none;">
    </div>

    <button type="button" onclick="procesarAuth()" style="width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; margin-bottom: 10px;">Ingresar a la Tienda</button>
  </div>

  <!-- VISTA PRINCIPAL DE LA TIENDA (Se muestra al entrar) -->
  <div id="vista-tienda" style="display: none; max-width: 450px; margin: 20px auto; background: #0b0f19; padding: 20px; border-radius: 16px; border: 1px solid #1e293b; box-sizing: border-box;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; background: #111827; padding: 12px 15px; border-radius: 12px; border: 1px solid #1e293b; margin-bottom: 15px;">
      <div>
        <span style="font-size: 11px; color: #94a3b8; display: block;">Cliente Activo</span>
        <b id="lbl-user-email" style="font-size: 13px; color: #38bdf8;">usuario@mail.com</b>
      </div>
      <button onclick="cerrarSesion()" style="padding: 6px 10px; background: #ef4444; color: #fff; border: none; border-radius: 6px; font-size: 11px; cursor: pointer;">Salir</button>
    </div>

    <div style="background: #111827; padding: 15px; border-radius: 12px; border: 1px solid #1e293b; text-align: center; margin-bottom: 15px;">
      <p style="margin: 0; font-size: 11px; color: #94a3b8;">YAPE OFICIAL DE PAGOS</p>
      <h3 style="margin: 5px 0; color: #c084fc; font-size: 18px;">969 061 421</h3>
      <p style="margin: 0; font-size: 11px; color: #38bdf8;">Adan Elera Pena</p>
    </div>

    <button onclick="alert('Sección de yapeo lista para usar')" style="width: 100%; padding: 14px; background: #7d2ae8; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer;">📸 Enviar Captura de Yape</button>
  </div>

  <script>
    function procesarAuth() {
      const email = document.getElementById('auth-email').value.trim();
      if(!email) {
        alert("Por favor ingresa tu correo");
        return;
      }
      // Oculta el login y muestra la tienda
      document.getElementById('vista-auth').style.display = 'none';
      document.getElementById('vista-tienda').style.display = 'block';
      document.getElementById('lbl-user-email').innerText = email;
    }

    function cerrarSesion() {
      document.getElementById('vista-tienda').style.display = 'none';
      document.getElementById('vista-auth').style.display = 'block';
    }
  </script>

</body>
</html>
