<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elera Ventas</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111827;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.caja{
    background:white;
    width:350px;
    padding:25px;
    border-radius:20px;
    text-align:center;
}

h1{
    color:#16a34a;
}

input{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:95%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:16px;
    margin:8px;
}

button:hover{
    background:#15803d;
}

a{
    color:#2563eb;
    cursor:pointer;
}

#registro{
    display:none;
}
</style>

</head>

<body>


<div class="caja">

<h1>💎 Elera Ventas</h1>

<p>Recarga de Diamantes Free Fire</p>


<div id="login">

<h3>Iniciar sesión</h3>

<input id="correo" placeholder="Correo">

<input id="clave" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p>
¿No tienes cuenta?
<a onclick="abrirRegistro()">Registrarse</a>
</p>

</div>



<div id="registro">

<h3>Crear cuenta</h3>

<input id="correoNuevo" placeholder="Correo">

<input id="claveNueva" type="password" placeholder="Contraseña">

<button onclick="registro()">Crear cuenta</button>

<p>
<a onclick="volver()">Volver</a>
</p>

</div>


</div>



<script>

function abrirRegistro(){

document.getElementById("login").style.display="none";
document.getElementById("registro").style.display="block";

}


function volver(){

document.getElementById("registro").style.display="none";
document.getElementById("login").style.display="block";

}



function registro(){

let correo=document.getElementById("correoNuevo").value;
let clave=document.getElementById("claveNueva").value;


localStorage.setItem("usuario",correo);
localStorage.setItem("password",clave);


alert("Cuenta creada");


volver();

}



function login(){

let correo=document.getElementById("correo").value;
let clave=document.getElementById("clave").value;


if(
correo==localStorage.getItem("usuario") &&
clave==localStorage.getItem("password")
){

alert("Bienvenido a Elera Ventas");


window.location="tienda.html";


}else{

alert("Datos incorrectos");

}


}


</script>


</body>
</html>
