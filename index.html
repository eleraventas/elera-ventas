<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adan Recargas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    width:95%;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}
</style>

</head>

<body>

<div class="login">

<h2>💎 Adan Recargas</h2>

<h3>Iniciar sesión</h3>

<input type="email" placeholder="Correo electrónico">

<input type="password" placeholder="Contraseña">

<button>Ingresar</button>

<p>¿No tienes cuenta? Registrarse</p>

</div>

</body>
</html>
