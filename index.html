<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elera Ventas - Tienda Oficial</title>
</head>
<body style="background: #060913; margin: 0; padding: 20px; font-family: sans-serif; color: #fff;">

  <div style="max-width: 400px; margin: 30px auto; background: #0b0f19; padding: 25px; border-radius: 16px; border: 1px solid #1e293b; box-sizing: border-box;">
    
    <div style="text-align: center; margin-bottom: 25px;">
      <h2 style="margin: 0; color: #f8fafc; font-size: 24px;">💎 ELERA VENTAS 💎</h2>
      <p style="font-size: 13px; color: #94a3b8; margin-top: 5px;">Sistema de Recargas</p>
    </div>

    <!-- BOTÓN DE ACCIÓN DIRECTA -->
    <button type="button" onclick="probarAccion()" style="width: 100%; padding: 15px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 15px;">Iniciar Sesión / Acceder</button>

    <div style="background: #111827; padding: 15px; border-radius: 12px; border: 1px solid #1e293b; text-align: center;">
      <p style="margin: 0; font-size: 12px; color: #38bdf8;">Estado: <b style="color: #34d399;">Sistema Activo</b></p>
    </div>

  </div>

  <script>
    function probarAccion() {
      alert("¡El botón funciona correctamente!");
    }
  </script>

</body>
</html>
